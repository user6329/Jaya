<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="/styles/contacto.css" >
</head>
<body>
    <nav>
        <a href="/index.html"onclick="showPage('home')">Home</a>
        <a href="/sign_in.html" onclick="showPage('inicio')">Inicio</a>
        <a href="/Contacto.html" onclick="showPage('contacto')">Contacto</a>
    </nav>
    <div class="contact-container">
        <div class="contact-form">
            <h2>¡Hablemos!</h2>
            <form>
                <input type="text" placeholder="Tu nombre" required>
                <input type="email" placeholder="Tu email" required>
                <textarea placeholder="Tu mensaje" required></textarea>
                <button type="submit">Enviar Mensaje</button>
            </form>
        </div>
        <div class="contact-info">
            <p><strong>Dirección:</strong> 200 N. Spring Street, Los Ángeles, CA 90012</p>
            <p><strong>Teléfono:</strong> +1 (111) 111-1111</p>
            <p><strong>Email:</strong> contacto@email.com</p>
        </div>
    </div>
</body>
</html>
