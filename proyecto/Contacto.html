<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="/styles/contacto.css">
</head>
<body>
    <nav>
        <a href="/index.html"onclick="showPage('home')">Home</a>
        <a href="/sing_in.html" onclick="showPage('inicio')">Inicio</a>
        <a href="/Contacto.html" onclick="showPage('contacto')">Contacto</a>
    </nav>
    <div class="container">
          <!-- Contenedor del formulario -->
        <div class="form-container">
          <!-- Formulario de Registro -->
            <div class="form-box registration">
                <h2>Registro</h2>
                <form>
                    <div class="input-box">
                        <input type="text" required>
                        <label>Nombre completo</label>
                    </div>
                    <div class="input-box">
                        <input type="email" required>
                        <label>Correo electrónico</label>
                    </div>
                    <div class="input-box">
                        <input type="password" required>
                        <label>Contraseña</label>
                    </div>
                    <button type="submit">Registrarse</button>
                    <p class="login-link">¿Ya tienes una cuenta? <a href="#">Inicia sesión</a></p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
